name: CI

on: [push, pull_request]

jobs:
  check-linux:
    name: Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            spamassassin \
            libwww-perl \
            libjson-perl

      - name: Run checks
        run: sh ci/check.sh

  check-freebsd:
    name: Check (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            /usr/local/bin/sudo pkg install -y spamassassin p5-JSON p5-libwww
            sh ci/check.sh

  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install cpanminus
          sudo cpanm --notest Mail::SpamAssassin LWP::UserAgent JSON

      - name: Run checks
        run: sh ci/check.sh

  encoding:
    name: Encoding check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: AI/AI.pm should be 7-bit ASCII
        run: |
          if perl -ne 'exit 1 if /[\x80-\xff]/' AI/AI.pm; then
            echo "OK: AI/AI.pm is 7-bit ASCII"
          else
            echo "FAIL: AI/AI.pm contains non-ASCII bytes"
            perl -ne 'print "$.: $_" if /[\x80-\xff]/' AI/AI.pm
            exit 1
          fi

      - name: AGENTS.md should be valid UTF-8
        run: |
          if iconv -f utf-8 -t utf-8 AGENTS.md > /dev/null 2>&1; then
            echo "OK: AGENTS.md is valid UTF-8"
          else
            echo "FAIL: AGENTS.md is not valid UTF-8"
            exit 1
          fi
